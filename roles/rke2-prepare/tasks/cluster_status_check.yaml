- name: Set initial loop counter
  set_fact:
    loop_counter: 0

- name: Ensure nodes and essential pods are ready (main loop)
  block:
  - name: Check if all nodes are ready
    shell: kubectl get nodes --no-headers | awk '{print $2}' | grep -v 'Ready' | wc -l
    register: nodes_not_ready_count
    until: nodes_not_ready_count.stdout | int == 0
    retries: "{{ max_retries }}"
    delay: "{{ delay }}"
    changed_when: false

  - name: Debug nodes_not_ready_count
    debug:
      var: nodes_not_ready_count

  - name: Check if all essential pods are running
    shell: |
      kubectl get pods -n {{ item }} --no-headers | awk '{print $3}' | grep -v 'Running' | wc -l
    loop: "{{ essential_namespaces }}"
    register: pods_not_running_count
    until: pods_not_running_count.results | map(attribute='stdout') | map('int') | sum == 0
    retries: "{{ max_retries }}"
    delay: "{{ delay }}"
    changed_when: false

  - name: Debug pods_not_running_count
    debug:
      var: pods_not_running_count

  - name: Check if any essential pods are not running
    fail:
      msg: "Not all essential pods are in 'Running' state."
    when: pods_not_running_count.results | map(attribute='stdout') | map('int') | sum != 0

  rescue:
  - name: Increment loop counter
    set_fact:
      loop_counter: "{{ loop_counter | int + 1 }}"

  - name: Reboot nodes that are not ready
    shell: |
      for node in $(kubectl get nodes --no-headers | awk '{print $1}'); do
        if ! kubectl get node $node -o json | jq -e '.status.conditions[] | select(.type=="Ready" and .status=="True")'; then
          kubectl drain $node --ignore-daemonsets --delete-emptydir-data
          kubectl delete node $node
          # Assuming you have a mechanism to automatically re-provision the node, e.g., auto-scaling group or similar.
        fi
      done
    register: reboot_result

  - name: Wait before retrying
    pause:
      minutes: 1

- name: Check loop counter
  fail:
    msg: "Cluster is not ready even after {{ max_loops }} attempts."
  when: loop_counter | int >= max_loops

- name: Add new servers or agents
  debug:
    msg: "Cluster is ready. Proceeding to add new servers or agents."
  when: loop_counter | int < max_loops
